<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="280" height="48">
  <defs>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- E letter - dark for light bg -->
  <text x="0" y="36" font-family="'Space Grotesk', 'Instrument Sans', 'Work Sans', sans-serif" font-weight="700" font-size="38" fill="#0a0f1a">E</text>

  <!-- 5 numeral - amber accent -->
  <text x="24" y="36" font-family="'Space Grotesk', 'Instrument Sans', 'Work Sans', sans-serif" font-weight="700" font-size="38" fill="url(#amberGrad)">5</text>

  <!-- Labs text - dark for light bg -->
  <text x="46" y="36" font-family="'Space Grotesk', 'Instrument Sans', 'Work Sans', sans-serif" font-weight="700" font-size="38" fill="#0a0f1a">Labs</text>
</svg>